<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pro Expense Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<div class="header">

<h1>💰 Pro Expense Tracker</h1>

<button id="themeBtn">
🌙 Theme
</button>

</div>

<div class="cards">

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

<div class="card income">
<h3>Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card expense">
<h3>Expense</h3>
<h2 id="expense">₹0</h2>
</div>

<div class="card savings">
<h3>Savings</h3>
<h2 id="savings">₹0</h2>
</div>

</div>


<div class="budgetBox">

<h3>Monthly Budget</h3>

<input
id="budgetInput"
type="number"
placeholder="Enter Budget">

<button onclick="saveBudget()">

Save Budget

</button>

<div class="progress">

<div
id="progressFill">

</div>

</div>

<p id="budgetText">

Budget: ₹0

</p>

</div>


<div class="form">

<input
id="desc"
placeholder="Description">

<input
id="amount"
type="number"
placeholder="Amount">

<input
id="date"
type="date">

<select
id="type"
onchange="updateCategories()">

<option value="Income">
Income
</option>

<option value="Expense">
Expense
</option>

</select>


<select id="category">

</select>

<button onclick="addTransaction()">

Add Transaction

</button>

</div>


<input
id="search"
placeholder="Search Transactions">


<div class="dashboard">

<div>

<h2>Transactions</h2>

<div id="list">

</div>

</div>

<div>

<h2>Analytics</h2>

<canvas
id="chart">

</canvas>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
